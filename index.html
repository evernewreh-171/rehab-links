<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <!-- 保留 App 模式，但我們自己做導航欄 -->
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>復健科填報及查詢</title>
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* 稍微縮小間距以容納 5 個按鈕 */
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .btn {
            width: 85%;
            padding: 16px; /* 稍微縮小高度，讓五個按鈕不超出螢幕 */
            font-size: 18px;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* 顏色定義 */
        .btn-blue { background-color: #007BFF; }
        .btn-green { background-color: #28A745; }
        .btn-orange { background-color: #FD7E14; }
        .btn-red { background-color: #DC3545; } /* 副木登記顏色 */
        .btn-lightblue { background-color: #17A2B8; } /* 教育訓練按鈕顏色 */
        .btn-purple { background-color: #6F42C1; } /* 班表專用紫色 */
        .btn-notion { background-color: #37352F; } /* Notion 深灰色 */

        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
