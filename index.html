<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- 手機圖示設定 -->
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="復健填報">
    
    <title>復健科填報系統</title>
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 50px;
        }

        .btn {
            width: 280px;
            padding: 20px;
            font-size: 20px;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s; /* 點擊時的小縮放效果 */
        }

        .btn:active {
            transform: scale(0.95); /* 手機點擊按下去的感覺 */
        }

        .btn-primary { background-color: #007BFF; }
        .btn-secondary { background-color: #28A745; }
        .btn-warm { background-color: #FD7E14; }
    </style>
</head>
<body>

    <div class="button-container">
        <h1 style="color: #333;">🏥 復健科填報系統</h1>

        <a href="https://forms.gle/5VCj9cvXcdQ28A6W9" class="btn btn-primary" target="_blank">
            📝 RCW 填報專區
        </a>

    🍱 營新販賣部訂餐單
</a>
