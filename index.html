<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">

    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="復健系統">
    
    <title>復健科資訊導覽</title>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* 防止出現雙重捲軸 */
            background-color: #ffffff;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 頂部標題列 */
        .header {
            height: 60px;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #ddd;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 {
            font-size: 18px;
            color: #333;
            margin: 0;
        }

        /* Notion 嵌入區塊 */
        .notion-frame {
            width: 100%;
            height: calc(100% - 60px); /* 扣除標題列高度 */
            border: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🏥 復健科填報系統 (Notion 版)</h1>
    </div>

    <iframe 
        src="https://river-beef-217.notion.site/2a2a4fa1d89280b3afdbd5d4428bb869?v=2a2a4fa1d89281238ca0000c06ef4770" 
        class="notion-frame"
        allow="fullscreen">
    </iframe>

</body>
</html>
