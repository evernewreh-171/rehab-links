<!DOCTYPE html>

            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-primary { background-color: #007BFF; } /* 藍色 */
        .btn-secondary { background-color: #28A745; } /* 綠色 */
