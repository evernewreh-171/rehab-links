<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <!-- 隱身設定 -->
    <meta name="robots" content="noindex, nofollow">

    <!-- 手機圖示設定 -->
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="復健填報">
    
    <title>復健科填報系統</title>
    
    <style>
        body {
            background-color: #f8f9fa;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px; /* 縮小一點間距以容納四個按鈕 */
            margin-top: 40px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 5px;
        }

        .btn {
            width: 85%;
            padding: 18px;
            font-size: 19px;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* 顏色定義 */
        .btn-blue { background-color: #007BFF; }
        .btn-green { background-color: #28A745; }
        .btn-orange { background-color: #FD7E14; }
        .btn-notion { background-color: #37352F; } /* Notion 經典深灰色 */

        .footer {
            margin-top: 25px;
            color: #999;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <h1>🏥 復健科填報系統</h1>

        <!-- 原本的三個按鈕 -->
        <a href="https://forms.gle/5VCj9cvXcdQ28A6W9" class="btn btn-blue" target="_blank">
            📝 RCW 填報專區
        </a>

        <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vSn_QV-GtLvcAQu5GtclHarlflZGgowhTrqTLqQ61QYNJmFSdZHSOsvNjXeIAs12LxHdmv2ERlJzFbD/pubhtml" class="btn btn-green" target="_blank">
            📊 RCW 統計表查詢
        </a>

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSd55zPZiYoKzxIGExIKgFoffSWnSY3JF_uzBT6tp2lMyKiOGw/viewform" class="btn btn-orange" target="_blank">
            🍱 營新販賣部訂餐單
        </a>

        <!-- 新增的第 4 個 Notion 按鈕 -->
        <a href="https://river-beef-217.notion.site/2a2a4fa1d89280b3afdbd5d4428bb869?v=2a2a4fa1d89281238ca0000c06ef4770" class="btn btn-notion" target="_blank">
            📓 休假預排 Notion
        </a>

        <div class="footer">內部專用系統</div>
    </div>

</body>
</html>
